<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Packet Sniffer Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: #f5f5f5;
      text-align: center;
      padding: 20px;
    }
    h1 { color: #4cafef; }
    table {
      width: 90%;
      margin: 20px auto;
      border-collapse: collapse;
      background: #111a2b;
      border-radius: 10px;
      overflow: hidden;
    }
    th, td {
      padding: 10px;
      border: 1px solid #333;
      text-align: center;
    }
    th { background: #1a2333; color: #4cafef; }
    tr:nth-child(even) { background: #1b263b; }
    .dns { color: #ff9800; font-weight: bold; }
    .controls {
      margin: 20px;
    }
    button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    #startBtn { background: #4caf50; color: white; }
    #stopBtn { background: #f44336; color: white; }
  </style>
</head>
<body>
  <h1>Live Packet Sniffer</h1>
  <div class="controls">
    <button id="startBtn" onclick="startCapture()">Start Capture</button>
    <button id="stopBtn" onclick="stopCapture()">Stop Capture</button>
  </div>
  <p>Showing last 20 packets captured</p>

  <table>
    <thead>
      <tr>
        <th>Time</th>
        <th>Source IP</th>
        <th>Destination IP</th>
        <th>Protocol</th>
        <th>DNS Query</th>
      </tr>
    </thead>
    <tbody id="packet-table">
      <tr><td colspan="5">Waiting for capture...</td></tr>
    </tbody>
  </table>

  <script>
    let captureActive = false;

    async function fetchPackets() {
      if (!captureActive) return;

      try {
        let response = await fetch("http://127.0.0.1:8000/api/packets");
        let packets = await response.json();
        let table = document.getElementById("packet-table");
        table.innerHTML = "";

        if (packets.length === 0) {
          table.innerHTML = "<tr><td colspan='5'>No packets yet...</td></tr>";
          return;
        }

        packets.forEach(pkt => {
          let row = `<tr>
              <td>${pkt.time}</td>
              <td>${pkt.src_ip || "-"}</td>
              <td>${pkt.dst_ip || "-"}</td>
              <td>${pkt.protocol || "-"}</td>
              <td class="${pkt.dns_query ? 'dns' : ''}">${pkt.dns_query || "-"}</td>
            </tr>`;
          table.innerHTML += row;
        });
      } catch (error) {
        console.error("Error fetching packets:", error);
      }
    }

    async function startCapture() {
      await fetch("http://127.0.0.1:8000/api/start", { method: "POST" });
      captureActive = true;
    }

    async function stopCapture() {
      await fetch("http://127.0.0.1:8000/api/stop", { method: "POST" });
      captureActive = false;
    }

    // Keep refreshing every 3 seconds
    setInterval(fetchPackets, 3000);
  </script>
</body>
</html>
